<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>atlas Ledneva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="pictures/icon-192.png">
    <meta name="theme-color" content="#f5f0e6">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Атлас Леднёва</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-home">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-pathologies">Патологии</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-points">Точки</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-search">Поиск</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-about">О проекте</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-2">
        <!-- Главная страница -->
        <div id="mainPage">
            <h1 class="page-title">Добро пожаловать в Атлас</h1>
            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-sm btn-outline-secondary" id="btn-add-point" title="Добавить точку">
                    <i class="bi bi-plus-circle"></i> точка
                </button>
                <button class="btn btn-sm btn-outline-secondary" id="btn-export-csv" title="Экспорт в CSV">
                    <i class="bi bi-file-earmark-spreadsheet"></i> CSV
                </button>
                <button class="btn btn-sm btn-outline-secondary" id="btn-import-csv" title="Импорт из CSV">
                    <i class="bi bi-upload"></i> CSV
                </button>
                <input type="file" id="import-file" accept=".csv" style="display: none;">
            </div>
            <div class="accordion accordion-scroll mb-4" id="pathologyAccordion"></div>
        </div>

        <!-- Страница поиска (скрыта) -->
        <div id="searchPage" style="display: none;">
            <h1 class="page-title">Поиск точек</h1>
            <div class="card mb-3">
                <div class="card-header">Поиск точки</div>
                <div class="card-body">
                    <input type="text" class="form-control form-control-sm" id="pointSearchInput" placeholder="Введите название точки...">
                    <div id="searchResults" class="mt-2" style="max-height: 200px; overflow-y: auto;"></div>
                    <div id="singlePointDetails" class="mt-2" style="display: none;"></div>
                </div>
            </div>
            <div class="card mb-3">
                <div class="card-header">Выбор общих точек</div>
                <div class="card-body">
                    <div id="pathologyCheckboxList" style="max-height: 200px; overflow-y: auto;" class="mb-2"></div>
                    <button class="btn btn-sm btn-primary" id="findCommonPointsBtn">Ок</button>
                    <button class="btn btn-sm btn-secondary" id="clearCommonPointsBtn">Очистить</button>
                    <div id="commonPointsResult" class="mt-2" style="max-height: 200px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>

        <!-- Модальные окна -->
        <div class="modal fade" id="pointModal" tabindex="-1" aria-labelledby="pointModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="pointModalLabel">Добавить точку</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="pointForm">
                            <input type="hidden" id="editPathology" value="">
                            <input type="hidden" id="editIndex" value="">
                            <div class="mb-2">
                                <label class="form-label">Патология</label>
                                <input type="text" class="form-control form-control-sm" id="pointPathology" list="pathologyList" placeholder="Выберите или введите новую" required>
                                <datalist id="pathologyList"></datalist>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Название точки</label>
                                <input type="text" class="form-control form-control-sm" id="pointName" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Расположение</label>
                                <textarea class="form-control form-control-sm" id="pointDispersion" rows="2" required></textarea>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Описание</label>
                                <textarea class="form-control form-control-sm" id="pointDescription" rows="2"></textarea>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Ссылки на фото (через запятую)</label>
                                <input type="text" class="form-control form-control-sm" id="pointImages" placeholder="pictures/point1.jpg, pictures/point2.jpg">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="button" class="btn btn-sm btn-primary" id="savePointBtn">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="viewPointModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="viewPointTitle"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div id="carouselContainer" style="display: none;">
                            <div id="pointCarousel" class="carousel slide" data-bs-ride="false" data-bs-interval="false">
                                <div class="carousel-inner" id="carouselInner"></div>
                                <button class="carousel-control-prev" type="button" data-bs-target="#pointCarousel" data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Предыдущий</span>
                                </button>
                                <button class="carousel-control-next" type="button" data-bs-target="#pointCarousel" data-bs-slide="next">
                                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Следующий</span>
                                </button>
                            </div>
                        </div>
                        <div class="mt-3">
                            <div><strong>Расположение:</strong> <span id="viewDispersion"></span></div>
                            <div><strong>Описание:</strong> <span id="viewDescription"></span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-auto py-1">
        <div class="container text-center">
            <span class="text-muted small">© 2025 Атлас Леднёва. Все права защищены.</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Версия приложения - меняйте при обновлении
        const APP_VERSION = '1.0.0';
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => {
                        console.log('SW registered:', reg);
                        
                        // Проверка обновлений каждые 5 минут
                        setInterval(() => {
                            reg.update();
                        }, 5 * 60 * 1000);
                        
                        // Обработка обновлений
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            console.log('Найдено обновление Service Worker');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Новый SW установлен, предлагаем обновить страницу
                                    if (confirm('Доступна новая версия приложения. Обновить?')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.log('SW registration failed:', err));
            });

            // Обработка сообщений от SW
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'CACHE_UPDATED') {
                    console.log('Кэш обновлён:', event.data.url);
                }
            });
        }

        // Сохраняем версию в localStorage для проверки
        localStorage.setItem('app_version', APP_VERSION);
    </script>
</body>
</html>
